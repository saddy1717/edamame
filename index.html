<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#F2F2F7;color:#1C1C1E;font-size:15px;max-width:430px;margin:0 auto;min-height:100vh}
.screen{background:#fff;min-height:100vh;display:flex;flex-direction:column}
.status-bar{padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:center;background:#fff}
.status-time{font-size:13px;font-weight:600}
.sync-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.sync-ok{background:#E1F5EE;color:#085041}
.sync-ing{background:#FAEEDA;color:#633806}
.sync-err{background:#FCEBEB;color:#A32D2D}
.app-header{padding:6px 14px 8px;border-bottom:0.5px solid #E5E5EA;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:10}
.app-logo{display:flex;align-items:center;gap:8px}
.logo-wrap{width:34px;height:34px;border-radius:8px;overflow:hidden;background:#EAF3DE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-wrap img{width:34px;height:34px;object-fit:contain}
.app-title{font-size:18px;font-weight:500;letter-spacing:-0.3px}
.app-pills{display:flex;gap:5px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.pill-blue{background:#E6F1FB;color:#0C447C}
.pill-pink{background:#FBEAF0;color:#72243E}
.content{flex:1;overflow-y:auto;padding-bottom:80px}
.bottom-nav{border-top:0.5px solid #E5E5EA;display:flex;background:#fff;position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:10}
.nav-btn{flex:1;padding:9px 4px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;font-size:10px;color:#8E8E93}
.nav-btn.active{color:#3B6D11}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.urgent-strip{border-bottom:0.5px solid #E5E5EA;padding:10px 0 0}
.urgent-strip-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 7px}
.urgent-strip-title{font-size:12px;font-weight:500;color:#636366}
.urgent-strip-count{font-size:11px;background:#FCEBEB;color:#A32D2D;padding:1px 6px;border-radius:8px}
.urgent-scroll{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.urgent-scroll::-webkit-scrollbar{display:none}
.urgent-chip{flex-shrink:0;background:#F2F2F7;border:0.5px solid #E5E5EA;border-radius:10px;padding:8px 10px;cursor:pointer;width:170px}
.urgent-chip-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.urgent-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.urgent-chip-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.urgent-chip-due{font-size:10px;padding:1px 5px;border-radius:6px;white-space:nowrap}
.urgent-chip-meta{font-size:10px;color:#AEAEB2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.due-red{background:#FCEBEB;color:#A32D2D}
.due-amber{background:#FAEEDA;color:#633806}
.due-teal{background:#E1F5EE;color:#085041}
.due-gray{background:#F1EFE8;color:#444441}
.filter-row{display:flex;gap:5px;padding:6px 14px 8px;overflow-x:auto}
.filter-row::-webkit-scrollbar{display:none}
.f-btn{padding:5px 11px;border-radius:20px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:11px;color:#636366;white-space:nowrap;flex-shrink:0}
.f-btn.active{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.cal-wrap{padding:10px 10px 6px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px}
.cal-nav-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#636366;font-size:15px}
.cal-month-label{font-size:15px;font-weight:500}
.cal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:10px;color:#636366;padding:3px 0;font-weight:500}
.cal-day{min-height:64px;padding:3px 2px 2px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;gap:1px;overflow:hidden}
.cal-day-num{font-size:11px;color:#636366;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;align-self:center}
.cal-day.today .cal-day-num{background:#3B6D11;color:#fff;font-weight:500}
.cal-day.other .cal-day-num{color:#C7C7CC}
.cal-day.selected{background:#EAF3DE}
.cal-pill{font-size:8px;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;width:100%}
.cal-more{font-size:8px;color:#AEAEB2;text-align:center;line-height:1.4}
.day-tasks{border-top:0.5px solid #E5E5EA;padding:10px 14px 6px}
.day-tasks-header{font-size:12px;font-weight:500;color:#636366;margin-bottom:7px}
.task-card{background:#fff;border:0.5px solid #E5E5EA;border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.task-card:active{background:#F2F2F7}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.task-main{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:#636366;margin-top:2px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.due-badge{font-size:10px;padding:2px 6px;border-radius:6px;white-space:nowrap;font-weight:500}
.subsidy-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75}
.settings-section{padding:14px 16px}
.settings-group{background:#F2F2F7;border-radius:12px;overflow:hidden;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid #E5E5EA}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:14px}
.settings-row-sub{font-size:11px;color:#636366;margin-top:1px}
.settings-input{border:none;background:transparent;font-size:13px;color:#3B6D11;font-weight:500;text-align:right;width:115px;outline:none}
.save-btn{width:100%;padding:13px;border-radius:12px;border:none;background:#3B6D11;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.saved-msg{text-align:center;font-size:13px;color:#1D9E75;margin-top:10px;min-height:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:flex-end;z-index:100}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;padding:0 0 20px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#C7C7CC;border-radius:2px;margin:10px auto 12px;cursor:pointer}
.modal-body{padding:0 16px}
.modal-cat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px;line-height:1.3}
.modal-detail{font-size:13px;color:#636366;margin-bottom:12px;line-height:1.5}
.modal-rows{border-top:0.5px solid #E5E5EA;padding-top:2px;margin-bottom:12px}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #E5E5EA}
.modal-row:last-child{border-bottom:none}
.modal-row-label{font-size:13px;color:#636366}
.modal-row-val{font-size:13px;font-weight:500}
.modal-link{font-size:12px;color:#3B6D11;text-decoration:none;max-width:190px;text-align:right;word-break:break-all}
.owner-select{border:none;background:transparent;font-size:13px;font-weight:500;color:#1C1C1E;cursor:pointer;outline:none}
.date-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.date-input{flex:1;border:0.5px solid #E5E5EA;border-radius:8px;padding:7px 10px;font-size:13px;background:#F2F2F7;color:#1C1C1E;outline:none}
.move-btn{padding:7px 12px;border-radius:8px;border:none;background:#3B6D11;color:#fff;cursor:pointer;font-size:12px;white-space:nowrap;font-weight:500}
.status-row{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:0.5px solid #E5E5EA}
.status-label-txt{font-size:13px;color:#636366}
.toggle-btn{padding:6px 13px;border-radius:20px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:12px;color:#636366}
.toggle-btn.done{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.modal-close{margin:12px 16px 0;width:calc(100% - 32px);padding:11px;border-radius:12px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:14px;color:#636366}
.warn-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200}
.warn-overlay.hidden{display:none}
.warn-box{background:#fff;border-radius:14px;margin:16px;padding:16px;border:0.5px solid #F7C1C1;width:calc(100% - 32px);max-width:380px}
.warn-title{font-size:14px;font-weight:500;color:#A32D2D;margin-bottom:7px}
.warn-text{font-size:13px;color:#1C1C1E;line-height:1.5;margin-bottom:12px}
.warn-btns{display:flex;gap:8px}
.warn-btn{flex:1;padding:10px;border-radius:10px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:13px}
.warn-btn.ok{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.strike{text-decoration:line-through;opacity:0.5}
.empty-msg{font-size:13px;color:#AEAEB2;padding:12px 0}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#8E8E93;font-size:14px}
</style>

// ===== Firebase リアルタイム監視 =====
function initFirebase() {
  setSyncBadge('ing', '接続中...');

  // tasksをリアルタイム監視
  tasksRef.on('value', function(snap) {
    const val = snap.val();
    if (val) {
      // Firebaseはオブジェクト形式なのでArray変換
      if (Array.isArray(val)) {
        tasks = val.filter(function(t){ return t; });
      } else {
        tasks = Object.values(val).filter(function(t){ return t; });
      }
    } else {
      // Firebaseにデータがない場合は初期データを投入
      if (!fbInitialized) {
        fbInitialized = true;
        uploadInitialData();
        return;
      }
    }
    setSyncBadge('ok', '同期済み ✓');
    renderTab();
  }, function(err) {
    setSyncBadge('err', 'オフライン');
    // フォールバック
    if (!tasks.length) {
      tasks = EMBEDDED.tasks;
      settings = EMBEDDED.settings;
      renderTab();
    }
  });

  // settingsをリアルタイム監視
  settingsRef.on('value', function(snap) {
    const val = snap.val();
    if (val) settings = val;
  });
}

function uploadInitialData() {
  // 初回：埋め込みデータをFirebaseに投入
  tasks = EMBEDDED.tasks;
  settings = EMBEDDED.settings;
  tasksRef.set(tasks);
  settingsRef.set(settings);
  setSyncBadge('ok', '初期化完了 ✓');
  renderTab();
}

function setSyncBadge(type, text) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-badge sync-' + type;
  b.textContent = text;
}

// ===== Firebaseへの保存 =====
function saveToFirebase() {
  setSyncBadge('ing', '保存中...');
  tasksRef.set(tasks, function(err) {
    if (err) {
      setSyncBadge('err', '保存失敗');
    } else {
      setSyncBadge('ok', '保存完了 ✓');
    }
  });
}

function saveSettingsToFirebase() {
  settingsRef.set(settings, function(err) {
    if (err) console.error('settings save error', err);
  });
}

// ===== ユーティリティ =====
function parseDate(s){if(!s)return null;const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function fmtDate(d){if(!d)return '\u672a\u78ba\u5b9a';return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();}
function fmtInput(d){if(!d)return '';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysUntil(d){return Math.round((d-TODAY)/86400000);}
function ownerLabel(o){return(o==='\u3042\u306a\u305f'||o==='\u3086\u3046\u304d')?'\u3086\u3046\u304d':(o==='\u5a5a\u7d04\u8005'||o==='\u3042\u3084\u306d')?'\u3042\u3084\u306d':o;}
function dueBadge(d){const diff=daysUntil(d);if(diff<0)return{cls:'due-red',text:Math.abs(diff)+'\u65e5\u8d85\u904e'};if(diff===0)return{cls:'due-red',text:'\u4eca\u65e5'};if(diff<=7)return{cls:'due-red',text:'\u3042\u3068'+diff+'\u65e5'};if(diff<=14)return{cls:'due-amber',text:'\u3042\u3068'+diff+'\u65e5'};if(diff<=30)return{cls:'due-teal',text:'\u3042\u3068'+diff+'\u65e5'};return{cls:'due-gray',text:'\u3042\u3068'+diff+'\u65e5'};}
function ci(cat){return CATS[cat]||CATS['\u5168\u4f53\u7ba1\u7406'];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateClock(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
updateClock(); setInterval(updateClock,30000);

function switchTab(tab){currentTab=tab;document.getElementById('tab-cal').classList.toggle('active',tab==='calendar');document.getElementById('tab-set').classList.toggle('active',tab==='settings');renderTab();}
function renderTab(){if(currentTab==='calendar')renderCalendar();else renderSettings();}

function buildUrgentStrip(){
  const urgent=tasks.filter(function(t){return t.status!=='\u5b8c\u4e86';}).map(function(t){return Object.assign({},t,{_diff:daysUntil(parseDate(t.due))});}).filter(function(t){return t._diff<=14;}).sort(function(a,b){return a._diff-b._diff;});
  if(!urgent.length)return '';
  let chips='';
  urgent.forEach(function(t){const d=parseDate(t.due);const db=dueBadge(d);const c=ci(t.cat);chips+='<div class="urgent-chip" data-tid="'+t.id+'"><div class="urgent-chip-top"><span class="urgent-chip-dot" style="background:'+c.color+'"></span><span class="urgent-chip-name">'+esc(t.name)+'</span><span class="urgent-chip-due '+db.cls+'">'+db.text+'</span></div><div class="urgent-chip-meta">'+t.cat+' \u00b7 '+ownerLabel(t.owner)+'</div></div>';});
  return '<div class="urgent-strip"><div class="urgent-strip-header"><span class="urgent-strip-title">\u76f4\u8fd1\u30bf\u30b9\u30af</span><span class="urgent-strip-count">'+urgent.length+'\u4ef6</span></div><div class="urgent-scroll" id="urgent-scroll">'+chips+'</div></div>';
}

function renderCalendar(){
  if(!tasks.length){document.getElementById('main-content').innerHTML='<div class="loading">\u30c7\u30fc\u30bf\u3092\u8aad\u307f\u8fbc\u307f\u4e2d...</div>';return;}
  const filtered=tasks.filter(function(t){if(t.status==='\u5b8c\u4e86')return false;if(calFilter==='\u3086\u3046\u304d')return ownerLabel(t.owner)==='\u3086\u3046\u304d';if(calFilter==='\u3042\u3084\u306d')return ownerLabel(t.owner)==='\u3042\u3084\u306d';return true;});
  const first=new Date(calYear,calMonth,1);const last=new Date(calYear,calMonth+1,0);const startDay=first.getDay();
  let cells=[];
  for(let i=0;i<startDay;i++)cells.push({date:new Date(calYear,calMonth,1-startDay+i),other:true});
  for(let i=1;i<=last.getDate();i++)cells.push({date:new Date(calYear,calMonth,i),other:false});
  while(cells.length%7!==0){const prev=cells[cells.length-1].date;const n=new Date(prev);n.setDate(n.getDate()+1);cells.push({date:n,other:true});}
  const dows=['\u65e5','\u6708','\u706b','\u6c34','\u6728','\u91d1','\u571f'];
  let daysHtml='';
  cells.forEach(function(cell){
    const isToday=cell.date.toDateString()===TODAY.toDateString();
    const isSelected=selectedDate&&cell.date.toDateString()===selectedDate.toDateString();
    const dayTasks=filtered.filter(function(t){const d=parseDate(t.due);return d&&d.toDateString()===cell.date.toDateString();});
    let pillsHtml='';
    dayTasks.slice(0,3).forEach(function(t){const c=ci(t.cat);const short=t.name.length>7?t.name.slice(0,6)+'\u2026':t.name;pillsHtml+='<div class="cal-pill" style="background:'+c.bg+';color:'+c.tc+'">'+esc(short)+'</div>';});
    if(dayTasks.length>3)pillsHtml+='<div class="cal-more">+'+(dayTasks.length-3)+'</div>';
    daysHtml+='<div class="cal-day'+(cell.other?' other':'')+(isToday?' today':'')+(isSelected?' selected':'')+'" data-ts="'+cell.date.getTime()+'"><span class="cal-day-num">'+cell.date.getDate()+'</span>'+pillsHtml+'</div>';
  });
  const calHtml='<div class="cal-wrap"><div class="cal-nav"><button class="cal-nav-btn" id="btn-prev">\u2039</button><div class="cal-month-label">'+calYear+'\u5e74'+(calMonth+1)+'\u6708</div><button class="cal-nav-btn" id="btn-next">\u203a</button></div><div class="cal-grid7">'+dows.map(function(d){return'<div class="cal-dh">'+d+'</div>';}).join('')+'</div><div class="cal-grid7" id="cal-grid">'+daysHtml+'</div></div>';
  const filterHtml='<div class="filter-row"><button class="f-btn'+(calFilter==='all'?' active':'')+'" data-filter="all">\u3059\u3079\u3066</button><button class="f-btn'+(calFilter==='\u3086\u3046\u304d'?' active':'')+'" data-filter="\u3086\u3046\u304d">\u3086\u3046\u304d</button><button class="f-btn'+(calFilter==='\u3042\u3084\u306d'?' active':'')+'" data-filter="\u3042\u3084\u306d">\u3042\u3084\u306d</button></div>';
  let dayHtml='';
  if(selectedDate){
    const sel=tasks.filter(function(t){const d=parseDate(t.due);return d&&d.toDateString()===selectedDate.toDateString();});
    dayHtml='<div class="day-tasks"><div class="day-tasks-header">'+(selectedDate.getMonth()+1)+'/'+selectedDate.getDate()+'\u306e\u30bf\u30b9\u30af\uff08'+sel.length+'\u4ef6\uff09</div>';
    if(!sel.length)dayHtml+='<div class="empty-msg">\u3053\u306e\u65e5\u306e\u30bf\u30b9\u30af\u306f\u3042\u308a\u307e\u305b\u3093</div>';
    sel.forEach(function(t){const d=parseDate(t.due);const db=dueBadge(d);const c=ci(t.cat);dayHtml+='<div class="task-card'+(t.status==='\u5b8c\u4e86'?' strike':'')+'" data-tid="'+t.id+'"><span class="cat-dot" style="background:'+c.color+'"></span><div class="task-main"><div class="task-name">'+esc(t.name)+'</div><div class="task-meta">'+t.cat+' \u00b7 '+ownerLabel(t.owner)+'</div></div><div class="task-right"><span class="due-badge '+db.cls+'">'+db.text+'</span>'+(t.subsidy?'<span class="subsidy-dot"></span>':'')+'</div></div>';});
    dayHtml+='</div>';
  }
  document.getElementById('main-content').innerHTML=buildUrgentStrip()+filterHtml+calHtml+dayHtml;
  document.getElementById('cal-grid').addEventListener('click',function(e){const day=e.target.closest('[data-ts]');if(!day)return;const d=new Date(+day.dataset.ts);if(selectedDate&&selectedDate.toDateString()===d.toDateString())selectedDate=null;else selectedDate=d;renderCalendar();});
  document.querySelector('.filter-row').addEventListener('click',function(e){const btn=e.target.closest('[data-filter]');if(!btn)return;calFilter=btn.dataset.filter;renderCalendar();});
  document.getElementById('btn-prev').addEventListener('click',function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}selectedDate=null;renderCalendar();});
  document.getElementById('btn-next').addEventListener('click',function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}selectedDate=null;renderCalendar();});
  const us=document.getElementById('urgent-scroll');
  if(us)us.addEventListener('click',function(e){const c=e.target.closest('[data-tid]');if(c)openTask(c.dataset.tid);});
  const dt=document.querySelector('.day-tasks');
  if(dt)dt.addEventListener('click',function(e){const c=e.target.closest('[data-tid]');if(c)openTask(c.dataset.tid);});
}

function openTask(id){
  const t=tasks.find(function(x){return x.id===id;});if(!t)return;
  const c=ci(t.cat);const d=parseDate(t.due);const db=d?dueBadge(d):{cls:'due-gray',text:'\u672a\u78ba\u5b9a'};const isDone=t.status==='\u5b8c\u4e86';const ownerStr=ownerLabel(t.owner);
  document.getElementById('modal-body').innerHTML=
    '<div class="modal-cat-row"><span style="width:8px;height:8px;border-radius:50%;background:'+c.color+';display:inline-block"></span><span style="font-size:12px;color:'+c.tc+';background:'+c.bg+';padding:2px 8px;border-radius:8px">'+t.cat+' \u00b7 '+t.sub+'</span><span class="due-badge '+db.cls+'" style="margin-left:auto">'+db.text+'</span></div>'
    +'<div class="modal-title"'+(isDone?' style="text-decoration:line-through;opacity:0.5"':'')+'>'+esc(t.name)+'</div>'
    +'<div class="modal-detail">'+esc(t.detail)+'</div>'
    +'<div class="modal-rows"><div class="modal-row"><span class="modal-row-label">\u671f\u9650\u65e5</span><span class="modal-row-val">'+fmtDate(d)+'</span></div>'
    +'<div class="modal-row"><span class="modal-row-label">\u4e3b\u62c5\u5f53</span><select class="owner-select" id="owner-sel-'+id+'"><option value="\u3086\u3046\u304d"'+(ownerStr==='\u3086\u3046\u304d'?' selected':'')+'>\u3086\u3046\u304d</option><option value="\u3042\u3084\u306d"'+(ownerStr==='\u3042\u3084\u306d'?' selected':'')+'>\u3042\u3084\u306d</option></select></div>'
    +(t.subsidy?'<div class="modal-row"><span class="modal-row-label">\u7d66\u4ed8\u30fb\u63a7\u9664</span><span class="modal-row-val" style="color:#085041">'+esc(t.subsidy)+'</span></div>':'')
    +(t.url?'<div class="modal-row"><span class="modal-row-label">\u53c2\u8003URL</span><a href="'+t.url+'" class="modal-link" target="_blank">'+t.url.replace('https://','').split('/')[0]+'</a></div>':'')
    +'</div>'
    +'<div class="date-edit-row"><input type="date" class="date-input" id="dinput-'+id+'" value="'+fmtInput(d)+'"><button class="move-btn" id="move-btn-'+id+'">\u65e5\u4ed8\u3092\u5909\u66f4</button></div>'
    +'<div class="status-row"><span class="status-label-txt">\u30b9\u30c6\u30fc\u30bf\u30b9</span><button class="toggle-btn'+(isDone?' done':'')+'" id="toggle-btn-'+id+'">'+(isDone?'\u5b8c\u4e86 \u2192 \u623b\u3059':'\u672a\u7740\u624b \u2192 \u5b8c\u4e86')+'</button></div>';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('owner-sel-'+id).addEventListener('change',function(e){t.owner=e.target.value;saveToFirebase();});
  document.getElementById('move-btn-'+id).addEventListener('click',function(){moveTask(id);});
  document.getElementById('toggle-btn-'+id).addEventListener('click',function(){t.status=t.status==='\u5b8c\u4e86'?'\u672a\u7740\u624b':'\u5b8c\u4e86';saveToFirebase();closeModal();renderCalendar();});
}

function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===document.getElementById('modal-overlay'))closeModal();});

function moveTask(id){
  const t=tasks.find(function(x){return x.id===id;});const inp=document.getElementById('dinput-'+id);
  if(!t||!inp||!inp.value)return;const newDate=parseDate(inp.value);if(!newDate)return;
  const warns=[];
  if(id==='1.10'){const move=parseDate(settings['\u5f15\u8d8a\u3057\u5e0c\u671b\u65e5']);const cut=new Date(move);cut.setDate(cut.getDate()-60);if(newDate>cut)warns.push('\u9000\u53bb\u901a\u77e5\u306f\u5f15\u8d8a\u3057\u4e88\u5b9a\u65e5\uff08'+fmtDate(move)+'\uff09\u306e2\u30f6\u6708\u524d\uff08'+fmtDate(cut)+'\uff09\u307e\u3067\u306b\u5fc5\u8981\u3067\u3059\u3002');}
  if(id==='2.11'){const ny=parseDate(settings['\u5165\u7c4d\u4e88\u5b9a\u65e5']);if(newDate>ny)warns.push('\u5a5a\u59fb\u5c4a\u63d0\u51fa\u65e5\u304c\u5165\u7c4d\u4e88\u5b9a\u65e5\uff08'+fmtDate(ny)+'\uff09\u3092\u8d85\u3048\u3066\u3044\u307e\u3059\u3002');}
  if(warns.length){pendingId=id;pendingDate=inp.value;document.getElementById('warn-text').textContent=warns[0];document.getElementById('warn-overlay').classList.remove('hidden');}
  else{applyMove(id,inp.value);}
}
function applyMove(id,dateStr){
  const t=tasks.find(function(x){return x.id===id;});
  if(t){t.due=dateStr;saveToFirebase();}
  closeModal();renderCalendar();
}
function confirmMove(){if(pendingId&&pendingDate)applyMove(pendingId,pendingDate);document.getElementById('warn-overlay').classList.add('hidden');pendingId=null;pendingDate=null;}
function cancelWarn(){document.getElementById('warn-overlay').classList.add('hidden');pendingId=null;pendingDate=null;}

function renderSettings(){
  const items=[
    {key:'\u5165\u7c4d\u4e88\u5b9a\u65e5',label:'\u5165\u7c4d\u4e88\u5b9a\u65e5',sub:'\u5a5a\u59fb\u5c4a\u63d0\u51fa\u65e5'},
    {key:'\u5f15\u8d8a\u3057\u5e0c\u671b\u65e5',label:'\u5f15\u8d8a\u3057\u5e0c\u671b\u65e5',sub:'\u540c\u5c45\u958b\u59cb\u65e5'},
    {key:'\u51fa\u7523\u4e88\u5b9a\u65e5',label:'\u51fa\u7523\u4e88\u5b9a\u65e5',sub:''},
    {key:'\u7523\u4f11\u958b\u59cb\u4e88\u5b9a',label:'\u3042\u3084\u306d\u7523\u4f11\u958b\u59cb\u4e88\u5b9a',sub:''}
  ];
  let rows='';
  items.forEach(function(item){rows+='<div class="settings-row"><div><div class="settings-row-label">'+item.label+'</div>'+(item.sub?'<div class="settings-row-sub">'+item.sub+'</div>':'')+' </div><input type="date" class="settings-input" id="set-'+item.key+'" value="'+(settings[item.key]||'')+'"></div>';});
  document.getElementById('main-content').innerHTML=
    '<div class="settings-section">'
    +'<div style="font-size:12px;font-weight:500;color:#636366;margin-bottom:8px">\u91cd\u8981\u306a\u65e5\u4ed8</div>'
    +'<div class="settings-group">'+rows+'</div>'
    +'<button class="save-btn" id="save-btn">\u5909\u66f4\u3092\u4fdd\u5b58\u3059\u308b</button>'
    +'<div class="saved-msg" id="saved-msg"></div>'
    +'<div style="margin-top:16px;padding:12px;background:#EAF3DE;border-radius:10px;font-size:12px;color:#27500A;line-height:1.7">'
    +'\ud83d\udd04 Firebase\u30ea\u30a2\u30eb\u30bf\u30a4\u30e0\u540c\u671f\u6709\u52b9<br>'
    +'\u3086\u3046\u304d\u30fb\u3042\u3084\u306e\u3069\u3061\u3089\u304c\u5909\u66f4\u3057\u3066\u3082\u76f8\u624b\u306e\u753b\u9762\u306b\u81ea\u52d5\u53cd\u6620\u3055\u308c\u307e\u3059'
    +'</div>'
    +'</div>';
  document.getElementById('save-btn').addEventListener('click',function(){
    items.forEach(function(item){const inp=document.getElementById('set-'+item.key);if(inp&&inp.value)settings[item.key]=inp.value;});
    saveSettingsToFirebase();
    const msg=document.getElementById('saved-msg');msg.textContent='\u4fdd\u5b58\u3057\u307e\u3057\u305f';setTimeout(function(){msg.textContent='';},2000);
  });
}

// ===== 起動 =====
initFirebase();
</script>
</body>
</html>
