<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>えだまめ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#F2F2F7;color:#1C1C1E;font-size:15px}
.phone{background:#E5E5EA;border-radius:20px;padding:10px;max-width:390px;margin:0 auto}
.screen{background:#FFFFFF;border-radius:14px;overflow:hidden;min-height:760px;display:flex;flex-direction:column}
.status-bar{padding:10px 16px 4px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.status-time{font-size:13px;font-weight:500}
.status-icons{font-size:11px;color:#8E8E93}
.app-header{padding:6px 14px 8px;border-bottom:0.5px solid #E5E5EA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-logo{display:flex;align-items:center;gap:8px}
.logo-wrap{width:34px;height:34px;border-radius:8px;overflow:hidden;background:#EAF3DE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-wrap img{width:34px;height:34px;object-fit:contain}
.app-title{font-size:18px;font-weight:500;letter-spacing:-0.3px}
.app-pills{display:flex;gap:5px}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.pill-blue{background:#E6F1FB;color:#0C447C}
.pill-pink{background:#FBEAF0;color:#72243E}
.content{flex:1;overflow-y:auto;padding-bottom:70px}
.bottom-nav{border-top:0.5px solid #E5E5EA;display:flex;background:#FFFFFF;flex-shrink:0}
.nav-btn{flex:1;padding:9px 4px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;font-size:10px;color:#8E8E93}
.nav-btn.active{color:#3B6D11}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.urgent-strip{border-bottom:0.5px solid #E5E5EA;padding:10px 0 0}
.urgent-strip-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 7px}
.urgent-strip-title{font-size:12px;font-weight:500;color:#636366}
.urgent-strip-count{font-size:11px;background:#FCEBEB;color:#A32D2D;padding:1px 6px;border-radius:8px}
.urgent-scroll{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.urgent-scroll::-webkit-scrollbar{display:none}
.urgent-chip{flex-shrink:0;background:#F2F2F7;border:0.5px solid #E5E5EA;border-radius:10px;padding:8px 10px;cursor:pointer;width:170px}
.urgent-chip-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.urgent-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.urgent-chip-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.urgent-chip-due{font-size:10px;padding:1px 5px;border-radius:6px;white-space:nowrap}
.urgent-chip-meta{font-size:10px;color:#AEAEB2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.due-red{background:#FCEBEB;color:#A32D2D}
.due-amber{background:#FAEEDA;color:#633806}
.due-teal{background:#E1F5EE;color:#085041}
.due-gray{background:#F1EFE8;color:#444441}
.filter-row{display:flex;gap:5px;padding:6px 14px 8px;overflow-x:auto}
.filter-row::-webkit-scrollbar{display:none}
.f-btn{padding:5px 11px;border-radius:20px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:11px;color:#636366;white-space:nowrap;flex-shrink:0}
.f-btn.active{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.cal-wrap{padding:10px 10px 6px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px}
.cal-nav-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#636366;font-size:15px}
.cal-month-label{font-size:15px;font-weight:500}
.cal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:10px;color:#636366;padding:3px 0;font-weight:500}
.cal-day{min-height:64px;padding:3px 2px 2px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;gap:1px;overflow:hidden}
.cal-day-num{font-size:11px;color:#636366;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;align-self:center}
.cal-day.today .cal-day-num{background:#3B6D11;color:#fff;font-weight:500}
.cal-day.other .cal-day-num{color:#C7C7CC}
.cal-day.selected{background:#EAF3DE}
.cal-pill{font-size:8px;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;width:100%}
.cal-more{font-size:8px;color:#AEAEB2;text-align:center;line-height:1.4}
.day-tasks{border-top:0.5px solid #E5E5EA;padding:10px 14px 6px}
.day-tasks-header{font-size:12px;font-weight:500;color:#636366;margin-bottom:7px}
.task-card{background:#FFFFFF;border:0.5px solid #E5E5EA;border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;gap:8px;align-items:flex-start}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.task-main{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:#636366;margin-top:2px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.due-badge{font-size:10px;padding:2px 6px;border-radius:6px;white-space:nowrap;font-weight:500}
.subsidy-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75}
.settings-section{padding:14px 16px}
.settings-group{background:#F2F2F7;border-radius:12px;overflow:hidden;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid #E5E5EA}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:14px}
.settings-row-sub{font-size:11px;color:#636366;margin-top:1px}
.settings-input{border:none;background:transparent;font-size:13px;color:#3B6D11;font-weight:500;text-align:right;width:115px;outline:none}
.save-btn{width:100%;padding:13px;border-radius:12px;border:none;background:#3B6D11;color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.saved-msg{text-align:center;font-size:13px;color:#1D9E75;margin-top:10px;min-height:20px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:flex-end;z-index:100}
.modal-overlay.hidden{display:none}
.modal{background:#FFFFFF;border-radius:16px 16px 0 0;width:100%;padding:0 0 20px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#C7C7CC;border-radius:2px;margin:10px auto 12px;cursor:pointer}
.modal-body{padding:0 16px}
.modal-cat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.modal-title{font-size:16px;font-weight:500;margin-bottom:4px;line-height:1.3}
.modal-detail{font-size:13px;color:#636366;margin-bottom:12px;line-height:1.5}
.modal-rows{border-top:0.5px solid #E5E5EA;padding-top:2px;margin-bottom:12px}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #E5E5EA}
.modal-row:last-child{border-bottom:none}
.modal-row-label{font-size:13px;color:#636366}
.modal-row-val{font-size:13px;font-weight:500}
.modal-link{font-size:12px;color:#3B6D11;text-decoration:none;max-width:190px;text-align:right;word-break:break-all}
.owner-select{border:none;background:transparent;font-size:13px;font-weight:500;color:#1C1C1E;cursor:pointer;outline:none}
.date-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.date-input{flex:1;border:0.5px solid #E5E5EA;border-radius:8px;padding:7px 10px;font-size:13px;background:#F2F2F7;color:#1C1C1E;outline:none}
.move-btn{padding:7px 12px;border-radius:8px;border:0.5px solid #C7C7CC;background:transparent;cursor:pointer;font-size:12px;white-space:nowrap}
.status-row{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:0.5px solid #E5E5EA}
.status-label-txt{font-size:13px;color:#636366}
.toggle-btn{padding:6px 13px;border-radius:20px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:12px;color:#636366}
.toggle-btn.done{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.modal-close{margin:12px 16px 0;width:calc(100% - 32px);padding:11px;border-radius:12px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:14px;color:#636366}
.warn-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200}
.warn-overlay.hidden{display:none}
.warn-box{background:#FFFFFF;border-radius:14px;margin:16px;padding:16px;border:0.5px solid #F7C1C1;width:calc(100% - 32px);max-width:380px}
.warn-title{font-size:14px;font-weight:500;color:#A32D2D;margin-bottom:7px}
.warn-text{font-size:13px;color:#1C1C1E;line-height:1.5;margin-bottom:12px}
.warn-btns{display:flex;gap:8px}
.warn-btn{flex:1;padding:10px;border-radius:10px;border:0.5px solid #E5E5EA;background:transparent;cursor:pointer;font-size:13px}
.warn-btn.ok{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.strike{text-decoration:line-through;opacity:0.5}
.empty-msg{font-size:13px;color:#AEAEB2;padding:12px 0}
</style>
</head>

// ===== ユーティリティ =====
function parseDate(s) {
  if (!s) return null;
  const p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function fmtDate(d) {
  if (!d) return '未確定';
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}
function fmtInput(d) {
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function ownerLabel(o) {
  return (o === 'あなた' || o === 'ゆうき') ? 'ゆうき' : (o === '婚約者' || o === 'あやね') ? 'あやね' : o;
}
function dueBadge(d) {
  const diff = daysUntil(d);
  if (diff < 0)  return {cls:'due-red',   text: Math.abs(diff) + '日超過'};
  if (diff === 0) return {cls:'due-red',   text: '今日'};
  if (diff <= 7)  return {cls:'due-red',   text: 'あと' + diff + '日'};
  if (diff <= 14) return {cls:'due-amber', text: 'あと' + diff + '日'};
  if (diff <= 30) return {cls:'due-teal',  text: 'あと' + diff + '日'};
  return {cls:'due-gray', text: 'あと' + diff + '日'};
}
function ci(cat) { return CATS[cat] || CATS['全体管理']; }

// ===== 時計 =====
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 30000);

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-cal').classList.toggle('active', tab === 'calendar');
  document.getElementById('tab-set').classList.toggle('active', tab === 'settings');
  renderTab();
}
function renderTab() {

  else renderSettings();
}

// ===== 直近タスク =====
function buildUrgentStrip() {
  const urgent = tasks
    .filter(t => t.status !== '完了')
    .map(t => ({...t, _diff: daysUntil(parseDate(t.due))}))
    .filter(t => t._diff <= 14)
    .sort((a,b) => a._diff - b._diff);
  if (!urgent.length) return '';

  let chips = '';
  urgent.forEach(t => {
    const d = parseDate(t.due);
    const db = dueBadge(d);
    const c = ci(t.cat);
    chips += '<div class="urgent-chip" data-tid="' + t.id + '">'
      + '<div class="urgent-chip-top">'
      + '<span class="urgent-chip-dot" style="background:' + c.color + '"></span>'
      + '<span class="urgent-chip-name">' + esc(t.name) + '</span>'
      + '<span class="urgent-chip-due ' + db.cls + '">' + db.text + '</span>'
      + '</div>'
      + '<div class="urgent-chip-meta">' + t.cat + ' · ' + ownerLabel(t.owner) + '</div>'
      + '</div>';
  });
  return '<div class="urgent-strip">'
    + '<div class="urgent-strip-header"><span class="urgent-strip-title">直近タスク</span>'
    + '<span class="urgent-strip-count">' + urgent.length + '件</span></div>'
    + '<div class="urgent-scroll" id="urgent-scroll">' + chips + '</div>'
    + '</div>';
}

// ===== カレンダー =====
function renderCalendar() {
  const filtered = tasks.filter(t => {
    if (t.status === '完了') return false;
    if (calFilter === 'ゆうき') return ownerLabel(t.owner) === 'ゆうき';
    if (calFilter === 'あやね') return ownerLabel(t.owner) === 'あやね';
    return true;
  });

  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  const startDay = first.getDay();

  let cells = [];
  for (let i = 0; i < startDay; i++) {
    cells.push({date: new Date(calYear, calMonth, 1-startDay+i), other: true});
  }
  for (let i = 1; i <= last.getDate(); i++) {
    cells.push({date: new Date(calYear, calMonth, i), other: false});
  }
  while (cells.length % 7 !== 0) {
    const prev = cells[cells.length-1].date;
    const n = new Date(prev); n.setDate(n.getDate()+1);
    cells.push({date: n, other: true});
  }

  const dows = ['日','月','火','水','木','金','土'];
  let daysHtml = '';
  cells.forEach(cell => {
    const isToday    = cell.date.toDateString() === TODAY.toDateString();
    const isSelected = selectedDate && cell.date.toDateString() === selectedDate.toDateString();
    const dayTasks   = filtered.filter(t => {
      const d = parseDate(t.due);
      return d && d.toDateString() === cell.date.toDateString();
    });
    let pillsHtml = '';
    dayTasks.slice(0,3).forEach(t => {
      const c = ci(t.cat);
      const short = t.name.length > 7 ? t.name.slice(0,6) + '…' : t.name;
      pillsHtml += '<div class="cal-pill" style="background:' + c.bg + ';color:' + c.tc + '">' + esc(short) + '</div>';
    });
    if (dayTasks.length > 3) pillsHtml += '<div class="cal-more">+' + (dayTasks.length-3) + '</div>';

    const cls = 'cal-day' + (cell.other?' other':'') + (isToday?' today':'') + (isSelected?' selected':'');
    daysHtml += '<div class="' + cls + '" data-ts="' + cell.date.getTime() + '">'
      + '<span class="cal-day-num">' + cell.date.getDate() + '</span>'
      + pillsHtml + '</div>';
  });

  const calHtml =
    '<div class="cal-wrap">'
    + '<div class="cal-nav">'
    + '<button class="cal-nav-btn" id="btn-prev">‹</button>'
    + '<div class="cal-month-label">' + calYear + '年' + (calMonth+1) + '月</div>'
    + '<button class="cal-nav-btn" id="btn-next">›</button>'
    + '</div>'
    + '<div class="cal-grid7">' + dows.map(d => '<div class="cal-dh">'+d+'</div>').join('') + '</div>'
    + '<div class="cal-grid7" id="cal-grid">' + daysHtml + '</div>'
    + '</div>';

  const filterHtml =
    '<div class="filter-row">'
    + '<button class="f-btn' + (calFilter==='all'?' active':'') + '" data-filter="all">すべて</button>'
    + '<button class="f-btn' + (calFilter==='ゆうき'?' active':'') + '" data-filter="ゆうき">ゆうき</button>'
    + '<button class="f-btn' + (calFilter==='あやね'?' active':'') + '" data-filter="あやね">あやね</button>'
    + '</div>';

  let dayHtml = '';
  if (selectedDate) {
    const sel = tasks.filter(t => {
      const d = parseDate(t.due);
      return d && d.toDateString() === selectedDate.toDateString();
    });
    dayHtml = '<div class="day-tasks"><div class="day-tasks-header">'
      + (selectedDate.getMonth()+1) + '/' + selectedDate.getDate() + 'のタスク（' + sel.length + '件）</div>';
    if (sel.length === 0) {
      dayHtml += '<div class="empty-msg">この日のタスクはありません</div>';
    } else {
      sel.forEach(t => {
        const d = parseDate(t.due);
        const db = dueBadge(d);
        const c = ci(t.cat);
        dayHtml += '<div class="task-card' + (t.status==='完了'?' strike':'') + '" data-tid="' + t.id + '">'
          + '<span class="cat-dot" style="background:' + c.color + '"></span>'
          + '<div class="task-main">'
          + '<div class="task-name">' + esc(t.name) + '</div>'
          + '<div class="task-meta">' + t.cat + ' · ' + ownerLabel(t.owner) + '</div>'
          + '</div>'
          + '<div class="task-right">'
          + '<span class="due-badge ' + db.cls + '">' + db.text + '</span>'
          + (t.subsidy ? '<span class="subsidy-dot"></span>' : '')
          + '</div></div>';
      });
    }
    dayHtml += '</div>';
  }

  document.getElementById('main-content').innerHTML =
    buildUrgentStrip() + filterHtml + calHtml + dayHtml;

  // イベント委任で登録
  const grid = document.getElementById('cal-grid');
  if (grid) {
    grid.addEventListener('click', e => {
      const day = e.target.closest('[data-ts]');
      if (!day) return;
      const ts = +day.dataset.ts;
      const d = new Date(ts);
      if (selectedDate && selectedDate.toDateString() === d.toDateString()) selectedDate = null;
      else selectedDate = d;
      renderCalendar();
    });
  }
  const filterRow = document.querySelector('.filter-row');
  if (filterRow) {
    filterRow.addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      calFilter = btn.dataset.filter;
      renderCalendar();
    });
  }
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  if (btnPrev) btnPrev.addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} selectedDate=null; renderCalendar(); });
  if (btnNext) btnNext.addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} selectedDate=null; renderCalendar(); });

  // 直近タスクのクリック
  const urgScroll = document.getElementById('urgent-scroll');
  if (urgScroll) {
    urgScroll.addEventListener('click', e => {
      const chip = e.target.closest('[data-tid]');
      if (chip) openTask(chip.dataset.tid);
    });
  }
  // 日付タスクのクリック
  const dt = document.querySelector('.day-tasks');
  if (dt) {
    dt.addEventListener('click', e => {
      const card = e.target.closest('[data-tid]');
      if (card) openTask(card.dataset.tid);
    });
  }
}

// ===== タスク詳細モーダル =====
function openTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const c  = ci(t.cat);
  const d  = parseDate(t.due);
  const db = d ? dueBadge(d) : {cls:'due-gray', text:'未確定'};
  const isDone = t.status === '完了';
  const ownerStr = ownerLabel(t.owner);

  document.getElementById('modal-body').innerHTML =
    '<div class="modal-cat-row">'
    + '<span style="width:8px;height:8px;border-radius:50%;background:' + c.color + ';display:inline-block"></span>'
    + '<span style="font-size:12px;color:' + c.tc + ';background:' + c.bg + ';padding:2px 8px;border-radius:8px">' + t.cat + ' · ' + t.sub + '</span>'
    + '<span class="due-badge ' + db.cls + '" style="margin-left:auto">' + db.text + '</span>'
    + '</div>'
    + '<div class="modal-title"' + (isDone?' style="text-decoration:line-through;opacity:0.5"':'') + '>' + esc(t.name) + '</div>'
    + '<div class="modal-detail">' + esc(t.detail) + '</div>'
    + '<div class="modal-rows">'
    + '<div class="modal-row"><span class="modal-row-label">期限日</span><span class="modal-row-val">' + fmtDate(d) + '</span></div>'
    + '<div class="modal-row"><span class="modal-row-label">主担当</span>'
    + '<select class="owner-select" id="owner-sel-' + id + '">'
    + '<option value="ゆうき"' + (ownerStr==='ゆうき'?' selected':'') + '>ゆうき</option>'
    + '<option value="あやね"' + (ownerStr==='あやね'?' selected':'') + '>あやね</option>'
    + '</select></div>'
    + (t.subsidy ? '<div class="modal-row"><span class="modal-row-label">給付・控除</span><span class="modal-row-val" style="color:#085041">' + esc(t.subsidy) + '</span></div>' : '')
    + (t.url ? '<div class="modal-row"><span class="modal-row-label">参考URL</span><a href="' + t.url + '" class="modal-link" target="_blank">' + t.url.replace('https://','').split('/')[0] + '</a></div>' : '')
    + '</div>'
    + '<div class="date-edit-row">'
    + '<input type="date" class="date-input" id="dinput-' + id + '" value="' + fmtInput(d) + '">'
    + '<button class="move-btn" id="move-btn-' + id + '">日付を変更</button>'
    + '</div>'
    + '<div class="status-row">'
    + '<span class="status-label-txt">ステータス</span>'
    + '<button class="toggle-btn' + (isDone?' done':'') + '" id="toggle-btn-' + id + '">' + (isDone?'完了 → 戻す':'未着手 → 完了') + '</button>'
    + '</div>';

  document.getElementById('modal-overlay').classList.remove('hidden');

  document.getElementById('owner-sel-' + id).addEventListener('change', e => {
    t.owner = e.target.value;
  });
  document.getElementById('move-btn-' + id).addEventListener('click', () => moveTask(id));
  document.getElementById('toggle-btn-' + id).addEventListener('click', () => {
    t.status = t.status === '完了' ? '未着手' : '完了';
    closeModal();
    renderCalendar();
  });
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ===== 日付変更 =====
function moveTask(id) {
  const t = tasks.find(x => x.id === id);
  const inp = document.getElementById('dinput-' + id);
  if (!t || !inp || !inp.value) return;
  const newDate = parseDate(inp.value);
  if (!newDate) return;

  const warns = [];
  if (id === '1.10') {
    const move = parseDate(settings['引越し希望日']);
    const cut = new Date(move); cut.setDate(cut.getDate()-60);
    if (newDate > cut) warns.push('退去通知は引越し予定日（' + fmtDate(move) + '）の2ヶ月前（' + fmtDate(cut) + '）までに必要です。');
  }
  if (id === '2.11') {
    const ny = parseDate(settings['入籍予定日']);
    if (newDate > ny) warns.push('婚姻届提出日が入籍予定日（' + fmtDate(ny) + '）を超えています。');
  }
  if (warns.length) {
    pendingId = id; pendingDate = inp.value;
    document.getElementById('warn-text').textContent = warns[0];
    document.getElementById('warn-overlay').classList.remove('hidden');
  } else {
    applyMove(id, inp.value);
  }
}
function applyMove(id, dateStr) {
  const t = tasks.find(x => x.id === id);
  if (t) t.due = dateStr;
  closeModal(); renderCalendar();
}
function confirmMove() {
  if (pendingId && pendingDate) applyMove(pendingId, pendingDate);
  document.getElementById('warn-overlay').classList.add('hidden');
  pendingId = null; pendingDate = null;
}
function cancelWarn() {
  document.getElementById('warn-overlay').classList.add('hidden');
  pendingId = null; pendingDate = null;
}

    {key:'産休開始予定',  label:'あやね産休開始予定',  sub:''}
  ];
  let rows = '';
  items.forEach(item => {
    rows += '<div class="settings-row">'
      + '<div><div class="settings-row-label">' + item.label + '</div>'
      + (item.sub ? '<div class="settings-row-sub">' + item.sub + '</div>' : '')
      + '</div>'
      + '<input type="date" class="settings-input" id="set-' + item.key + '" value="' + settings[item.key] + '">'
      + '</div>';
  });
  document.getElementById('main-content').innerHTML =
    '<div class="settings-section">'
    + '<div style="font-size:12px;font-weight:500;color:#636366;margin-bottom:8px">重要な日付</div>'
    + '<div class="settings-group">' + rows + '</div>'
    + '<button class="save-btn" id="save-btn">変更を保存する</button>'
    + '<div class="saved-msg" id="saved-msg"></div>'
    + '</div>';

  document.getElementById('save-btn').addEventListener('click', () => {
    items.forEach(item => {
      const inp = document.getElementById('set-' + item.key);
      if (inp && inp.value) settings[item.key] = inp.value;
    });
    const msg = document.getElementById('saved-msg');
    msg.textContent = '保存しました';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  });
}

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    tasks = EMBEDDED_DATA.tasks;
    settings = EMBEDDED_DATA.settings;
    if(bar) bar.textContent = '📎 埋め込みデータを表示中（GitHub Pages設定後に自動切替）';
  }
  renderTab();
}

loadTasks();
</script>
